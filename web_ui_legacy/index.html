<!doctype html>
<html>

<head>
  <meta http-equiv="Content-type" content="text/html; charset=utf-8" />
  <title>APP_TITLE</title>
  <link rel="stylesheet" href="styles.css" />
  <script>
    const lang = localStorage.getItem('lang') ?? 'en';
    window.tr = (key) => key;
    const getLang = async (lang) => {
      const response = await fetch(`lang.${lang}.json`);
      if (response.status === 200) {
        const json = await response.json();
        window.tr = (key) => json[key] ?? key;
        document.title = window.tr("APP_TITLE");
      }
    }

    window.langReady = getLang(lang).catch(async (error) => {
      console.log('Error while fecthing lang', error)
      if (lang !== 'en') await getLang('en');
    });

  </script>
  <script src="sha256.min.js"></script>
  <script type="module">
    import {
      render,
      html,
      signal,
      detach,
      effect,
      batch,
    } from "./preactive.js";
    import { ExitFromDirIcon } from "./icons.js";
    import {
      $location,
      parsePath,
      navigateTo,
      exitFromDir,
      openEntry,
    } from "./location.js";
    import { $errors } from "./error.js";
    import { $loading, LoadingAnimation } from "./spiner.js";
    import {
      selectFiles,
      $uploadingFiles,
      UploadingView,
      createProgressSignals,
    } from "./uploader.js";
    import { List, $list } from "./list.js";
    import {
      getDir,
      getStatus,
      uploadFile,
      deleteEntry,
      downloadEntry,
      reconnectUSB,
      usbControl,
    } from "./api.js";

    await window.langReady;

    const $usbDebugControl = signal(null);
    const $usbStatus = signal({
      connected: null,
      mediaPresent: null,
    });

    const updateDir = async (location) => {
      try {
        $loading.value = true;
        const list = await getDir(location);
        $list.value = list;
      } catch (error) {
        $errors.value = [...$errors.value, error.message];
      } finally {
        $loading.value = false;
      }
    };

    const updateStatus = async () => {
      try {
        const status = await getStatus();
        $usbDebugControl.value = Boolean(status.usb_debug_control);
        $usbStatus.value = {
          connected: Boolean(status.usb_connected),
          mediaPresent: Boolean(status.usb_media_present),
        };
      } catch (error) {
        console.error(error);
      }
    };

    updateStatus();
    setInterval(updateStatus, 1000);

    effect(async () => {
      updateDir($location.value);
    });

    const onDelete = async (entry) => {
      const { type, name } = entry;
      if (type !== "file" && type !== "dir") return;
      if (!window.confirm(`${window.tr("CONFIRM_DELETE_PREFIX")} "${name}"?`)) return;
      const currentPath = $location.peek();
      try {
        await deleteEntry(currentPath, entry);
        await updateDir(currentPath);
      } catch (error) {
        $errors.value = [...$errors.value, error.message || window.tr("ERROR_DELETE_FAILED")];
      } finally {
        $loading.value = false;
      }
    };

    const onDownload = async (entry) => {
      const { type, name } = entry;
      try {
        $loading.value = true;
        const blob = await downloadEntry(entry);
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = name;
        a.click();
        URL.revokeObjectURL(url);
      } catch (error) {
        $errors.value = [
          ...$errors.value,
          error.message || window.tr("ERROR_DOWNLOAD_FAILED"),
        ];
      } finally {
        $loading.value = false;
      }
    };

    const onUpload = async () => {
      const currentPath = $location.peek();
      try {
        const files = await selectFiles();
        if (!files.length) return;
        const filesMap = new WeakMap();
        $uploadingFiles.value = files.map((file) => {
          const fileEntry = {
            name: file.name,
            progress: createProgressSignals(),
            status: signal("UPLOAD_STATUS_INITIAL")
          };
          filesMap.set(file, fileEntry);
          return fileEntry;
        });
        $loading.value = true;
        for (const file of files) {
          await uploadFile(
            currentPath,
            file,
            (progress) => {
              const fileEntry = filesMap.get(file)
              batch(() => {
                fileEntry.progress.total.value = progress.total;
                fileEntry.progress.loaded.value = progress.loaded;
                fileEntry.progress.percent.value = progress.percent;
              });
            },
            (newStatus) => {
              const fileEntry = filesMap.get(file)
              fileEntry.status.value = newStatus;
            }
          );
        }
      } catch (error) {
        $errors.value = [...$errors.value, error.message || window.tr("ERROR_UPLOAD_FAILED")];
      } finally {
        $loading.value = false;
        $uploadingFiles.value = [];
        await updateDir(currentPath);
      }
    };

    const onOpen = async (entry) => {
      if (entry.type === "dir") {
        $location.value = [$location.value, entry.name].join("/");
      }
    };

    const forceReconnectUsb = async () => {
      try {
        $loading.value = true;
        await reconnectUSB();
        await updateStatus();
      } catch (error) {
        $errors.value = [
          ...$errors.value,
          error.message || window.tr("ERROR_USB_RECONNECT_FAILED"),
        ];
      } finally {
        $loading.value = false;
      }
    };

    const runUsbControl = async (action) => {
      try {
        $loading.value = true;
        await usbControl(action);
        await updateStatus();
      } catch (error) {
        $errors.value = [
          ...$errors.value,
          error.message || window.tr("ERROR_USB_CONTROL_FAILED"),
        ];
      } finally {
        $loading.value = false;
      }
    };

    const UsbStatusIndicator = ({ label, value }) => {
      const state = value === true ? "on" : value === false ? "off" : "unknown";
      const text =
        value === true
          ? window.tr("USB_STATUS_ON")
          : value === false
            ? window.tr("USB_STATUS_OFF")
            : window.tr("USB_STATUS_UNKNOWN");

      return html`<div class="usb-status-item">
        <span class=${`usb-status-dot ${state}`}></span>
        <span>${label}</span>
        <span class="usb-status-value">${text}</span>
      </div>`;
    };

    const UsbStatus = () =>
      html`<div class="usb-status">
        ${UsbStatusIndicator({
          label: window.tr("USB_STATUS_CONNECTED"),
          value: $usbStatus.value.connected,
        })}
        ${UsbStatusIndicator({
          label: window.tr("USB_STATUS_PRESENT"),
          value: $usbStatus.value.mediaPresent,
        })}
      </div>`;

    const UsbDebugControls = () =>
      html`<div class="usb-debug-controls">
        <button class="text-action" onclick=${() => runUsbControl("soft-disconnect")}>
          ${window.tr("BUTTON_USB_SOFT_DISCONNECT")}
        </button>
        <button class="text-action" onclick=${() => runUsbControl("soft-connect")}>
          ${window.tr("BUTTON_USB_SOFT_CONNECT")}
        </button>
        <button class="text-action" onclick=${() => runUsbControl("hard-disconnect")}>
          ${window.tr("BUTTON_USB_HARD_DISCONNECT")}
        </button>
        <button class="text-action" onclick=${() => runUsbControl("hard-connect")}>
          ${window.tr("BUTTON_USB_HARD_CONNECT")}
        </button>
      </div>`;

    const Header = () => {
      if ($uploadingFiles.value.length) {
        return html`<h1 id="location">${window.tr("HEADER_UPLOADING")}</h1>`;
      }

      return html`<button
            title=${window.tr("BUTTON_TITLE_EXIT_DIR")}
            style="${$location.value === ""
          ? "visibility: hidden"
          : "visibility: visible"}"
            onclick=${() => exitFromDir()}
          >
            ${ExitFromDirIcon}
          </button>
          <h1 id="location">
            ${$location.value === ""
          ? [
            html`<div>
                    <span>.</span><span class="path-delimiter">/</span>
                  </div>`,
          ]
          : [
            html`<div>
                    <a
                      href="#"
                      onclick=${(e) => {
                e.preventDefault();
                navigateTo(-1);
              }}
                      >.</a
                    >
                  </div>`,
            ...parsePath($location.value).map(
              (part, idx) =>
                html`<div>
                        <span class="path-delimiter">/</span
                        ><a
                          href="#"
                          onclick=${(e) => {
                    e.preventDefault();
                    navigateTo(idx);
                  }}
                          >${part}</a
                        >
                      </div>`,
            ),
          ]}
          </h1>
          <div class="header-actions">
            <button title=${window.tr("BUTTON_TITLE_UPLOAD_FILE")} onclick=${() => onUpload()}>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="feather feather-upload"
              >
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                <polyline points="17 8 12 3 7 8" />
                <line x1="12" y1="3" x2="12" y2="15" />
              </svg>
            </button>
          </div>`;
    };

    const FileBrowser = () =>
      html`<header>${Header()}</header>
          <div class="list-pending-anim">${LoadingAnimation()}</div>
          <div class="list-wrapper">
            ${$uploadingFiles.value.length
          ? UploadingView()
          : List({ onDownload, onDelete, onOpen })}
          </div>
          <footer>
            ${UsbStatus()}
            ${$usbDebugControl.value === true
          ? UsbDebugControls()
          : $usbDebugControl.value === false
            ? html`<button class="text-action" onclick=${forceReconnectUsb}>
                  ${window.tr("BUTTON_FORCE_RECONNECT_USB")}
                </button>`
            : ""}
          </footer>
          <div>
            <div class="errors">
              ${$errors.value.map(
            (err) => html`<div class="error">${err}</div>`,
          )}
            </div>
          </div>`;

    render(
      document.body,
      () => html` <div class="app">${FileBrowser()}</div> `,
    );
  </script>
</head>

<body></body>

</html>
